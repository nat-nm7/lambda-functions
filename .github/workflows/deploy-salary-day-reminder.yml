name: Deploy salary-day-reminder to AWS Lambda

on:
  push:
    branches: [ "main" ]
    paths: [ "salary-day-reminder/**" ]

permissions:
  id-token: write
  contents: read

jobs:
  call-workflow:
    name: Call Workflow
    uses: ./.github/workflows/reusable-workflow.yml
    with:
      function-name: salary-day-reminder
    secrets: inherit
