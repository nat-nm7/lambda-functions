name: Deploy discord-notifier to AWS Lambda

on:
  push:
    branches: [ "main" ]
    paths: [ "discord-notifier/**" ]

permissions:
  id-token: write
  contents: read

jobs:
  call-workflow:
    name: Call Workflow
    uses: ./.github/workflows/reusable-workflow.yml
    with:
      function-name: discord-notifier
    secrets: inherit
