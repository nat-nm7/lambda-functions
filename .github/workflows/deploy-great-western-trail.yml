name: Deploy great-western-trail to AWS Lambda

on:
  push:
    branches: [ "main" ]
    paths: [ "great-western-trail/**" ]

permissions:
  id-token: write
  contents: read

jobs:
  call-workflow:
    name: Call Workflow
    uses: ./.github/workflows/reusable-workflow.yml
    with:
      function-name: great-western-trail
    secrets: inherit
